name: Node.js CI

on:
  push:
    branches:
      - main   # or master if your repo uses master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run server check
        run: node server.js & sleep 5

      - name: Success message
        run: echo "CI/CD pipeline executed successfully!"
